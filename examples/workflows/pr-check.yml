name: DriftGuard

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: driftguard/driftguard@v0
        id: driftguard
        with:
          mode: check

      - name: Upload SARIF
        if: always() && steps.driftguard.outputs.sarif-path != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.driftguard.outputs.sarif-path }}
